# SonarQube Cloud analysis (https://sonarcloud.io).
#
# Setup:
# 1. Import the repo at https://sonarcloud.io (sign in with GitHub).
# 2. Add a repository secret SONAR_TOKEN
#    (SonarCloud → avatar → My Account → Security → Generate Token).
# 3. Add two repository *variables* (Settings → Secrets and variables →
#    Actions → Variables):
#      - SONAR_ORGANIZATION  (e.g. brunojsc)
#      - SONAR_PROJECT_KEY   (e.g. BrunoJSC_app)
#    Both are shown on SonarCloud under Project Information.

name: SonarQube analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarQube to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history gives SonarQube accurate new-code / blame data.
          fetch-depth: 0

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >-
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
