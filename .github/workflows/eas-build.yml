name: EAS Build (Expo)

# Manually triggered so it never consumes EAS build minutes by surprise.
# Requires repo secret EXPO_TOKEN and a linked EAS project
# (run `bun x eas init` once inside apps/native to set extra.eas.projectId).

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        type: choice
        options: [all, android, ios]
        default: all
      profile:
        description: EAS build profile
        type: choice
        options: [development, preview, production]
        default: preview

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: eas build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run EAS build
        working-directory: apps/native
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
