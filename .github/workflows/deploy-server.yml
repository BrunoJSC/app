name: Deploy Server (Docker → GHCR)

# Builds the Elysia/Bun server into a Docker image and pushes it to the GitHub
# Container Registry. Uses the built-in GITHUB_TOKEN — no extra secret needed.
# Pull with: docker pull ghcr.io/<owner>/<repo>-server:latest

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/**"
      - "bun.lock"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-server
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
