name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (changed files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
            else
              echo "ref=$before" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Biome check (changed files only)
        # VCS flags are passed on the CLI so biome.json stays untouched.
        run: >-
          bunx biome check
          --changed
          --since=${{ steps.base.outputs.ref }}
          --vcs-enabled=true
          --vcs-client-kind=git
          --vcs-use-ignore-file=false

  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    env:
      # env packages validate at build time; CI has no real secrets, so skip it.
      SKIP_ENV_VALIDATION: "1"
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check & build
        run: bunx turbo run check-types build --cache-dir=.turbo
